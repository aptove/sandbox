name: devops-server container

on:
  push:
    branches:
      - "**"
    paths:
      - "devops-server/**"
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
  pull_request:
    paths:
      - "devops-server/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/devops-server

jobs:
  # ── Runs on every push / PR that touches devops-server/** ────────────────────
  test:
    name: Build and test (local, no push)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (amd64, no push)
        uses: docker/build-push-action@v5
        with:
          context: devops-server
          platforms: linux/amd64
          push: false
          load: true
          tags: devops-server:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify tool availability
        run: |
          docker run --rm devops-server:test bash -c "
            set -e
            echo '--- versions ---'
            tailscale version
            cloudflared --version
            aptove --version
            gh --version
            rustc --version
            cargo --version
            node --version
            npm --version
            chromium --version
            ufw --version
            fail2ban-client --version
            unattended-upgrades --help > /dev/null
            echo '--- all tools OK ---'
          "

      - name: Verify unattended-upgrades config
        run: |
          docker run --rm devops-server:test bash -c "
            grep -q 'Unattended-Upgrade \"1\"' /etc/apt/apt.conf.d/20auto-upgrades
            echo 'unattended-upgrades config OK'
          "

      - name: Verify Fail2ban jail config
        run: |
          docker run --rm devops-server:test bash -c "
            grep -q 'maxretry = 5' /etc/fail2ban/jail.local
            grep -q 'bantime = 1h' /etc/fail2ban/jail.local
            grep -q 'findtime = 10m' /etc/fail2ban/jail.local
            echo 'fail2ban jail config OK'
          "

      - name: Verify UFW rules are configured
        run: |
          docker run --rm devops-server:test bash -c "
            ufw show added | grep -q '22/tcp'
            ufw show added | grep -q '41641/udp'
            echo 'UFW rules OK'
          "

      - name: Verify non-root user
        run: |
          docker run --rm devops-server:test bash -c "
            [ \"\$(whoami)\" = 'developer' ]
            echo 'Non-root user OK'
          "

      - name: Test Rust compilation
        run: |
          docker run --rm devops-server:test bash -c "
            cd /tmp
            cargo new hello-test
            cd hello-test && cargo build --quiet
            echo 'Rust compilation OK'
          "

      - name: Test headless Chromium
        run: |
          docker run --rm devops-server:test bash -c "
            chromium --headless --no-sandbox --dump-dom https://example.com 2>/dev/null \
              | grep -q '<html' && echo 'Headless Chromium OK'
          "

  # ── Runs only on semver tags (e.g. 0.1.0) ────────────────────────────────────
  publish:
    name: Build and push multi-arch image
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.version }}
          labels: |
            org.opencontainers.image.title=devops-server
            org.opencontainers.image.description=Ubuntu 24.04 server container with Tailscale, cloudflared, Aptove, GitHub CLI, Rust, Node.js, headless Chromium, UFW, Fail2ban, and unattended-upgrades
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: devops-server
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image labels
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          docker buildx imagetools inspect "$IMAGE" \
            | grep -E "(title|description|source|version|revision)"
